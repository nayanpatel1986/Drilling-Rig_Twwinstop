[agent]
  interval = "1s"
  round_interval = true
  metric_batch_size = 1000
  metric_buffer_limit = 10000
  collection_jitter = "0s"
  flush_interval = "10s"
  flush_jitter = "0s"
  precision = ""
  hostname = "rig-telegraf"
  omit_hostname = false

[[outputs.influxdb_v2]]
  urls = ["http://influxdb:8086"]
  token = "my-super-secret-auth-token"
  organization = "nov_rig"
  bucket = "rig_data"

# ── Engine 1 (engine) ──
[[inputs.modbus]]
  name = "rig_sensors"
  slave_id = 1
  timeout = "1s"
  configuration_type = "register"
  controller = "tcp://10.10.10.1:502"

  holding_registers = [
    { name = "RPM", byte_order = "ABCD", data_type = "FLOAT32-IEEE", scale = 1.0, address = [0, 1] },
    { name = "OilPressure", byte_order = "ABCD", data_type = "FLOAT32-IEEE", scale = 1.0, address = [2, 3] },
    { name = "OilTemperature", byte_order = "ABCD", data_type = "FLOAT32-IEEE", scale = 1.0, address = [4, 5] },
    { name = "CoolantTemp", byte_order = "ABCD", data_type = "FLOAT32-IEEE", scale = 1.0, address = [6, 7] },
    { name = "ExhaustTemp", byte_order = "ABCD", data_type = "FLOAT32-IEEE", scale = 1.0, address = [8, 9] },
    { name = "FuelRate", byte_order = "ABCD", data_type = "FLOAT32-IEEE", scale = 1.0, address = [10, 11] },
    { name = "RunHours", byte_order = "ABCD", data_type = "FLOAT32-IEEE", scale = 1.0, address = [12, 13] },
    { name = "LoadPercent", byte_order = "ABCD", data_type = "FLOAT32-IEEE", scale = 1.0, address = [14, 15] },
    { name = "InstFuelCons", byte_order = "AB", data_type = "UINT16", scale = 0.05, address = [255] },
    { name = "TotalFuelCons", byte_order = "ABCD", data_type = "UINT32", scale = 1.0, address = [891, 892] },
    { name = "OverallPowerFactor", byte_order = "AB", data_type = "UINT16", scale = 1.0, address = [102] },
    { name = "TotalReactivePower", byte_order = "ABCD", data_type = "UINT32", scale = 1.0, address = [140, 141] },
    { name = "TotalPercentKW", byte_order = "AB", data_type = "UINT16", scale = 1.0, address = [104] },
  ]

  [inputs.modbus.tags]
    device_name = "Engine 1"
    device_type = "engine"
    rig_id = "E-1400-1"

