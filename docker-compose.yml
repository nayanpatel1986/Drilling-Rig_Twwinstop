version: '3.8'

services:
  # Time-Series Database - Isolated from network, accessible only via localhost
  influxdb:
    image: influxdb:2.7
    container_name: drillbit_influx
    ports:
      - "127.0.0.1:8087:8086"
    environment:
      - DOCKER_INFLUXDB_INIT_MODE=setup
      - DOCKER_INFLUXDB_INIT_USERNAME=${DOCKER_INFLUXDB_INIT_USERNAME:-admin}
      - DOCKER_INFLUXDB_INIT_PASSWORD=${INFLUXDB_PASSWORD:-password123}
      - DOCKER_INFLUXDB_INIT_ORG=${INFLUXDB_ORG:-nov_rig}
      - DOCKER_INFLUXDB_INIT_BUCKET=${INFLUXDB_BUCKET:-rig_data}
      - DOCKER_INFLUXDB_INIT_ADMIN_TOKEN=${INFLUXDB_TOKEN:-my-super-secret-auth-token}
    volumes:
      - influxdb_data:/var/lib/influxdb2

  # Relational Database - Isolated from network, accessible only via localhost
  postgres:
    image: postgres:15
    container_name: drillbit_postgres
    ports:
      - "127.0.0.1:5432:5432"
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-admin}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-password123}
      - POSTGRES_DB=${POSTGRES_DB:-rig_manager}
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # MQTT Broker - Hardened with Local Binding (Auth to be added in next step)
  mosquitto:
    image: eclipse-mosquitto:2
    container_name: drillbit_mqtt
    ports:
      - "127.0.0.1:1883:1883"
      - "127.0.0.1:9001:9001"
    volumes:
      - ./docker/mosquitto/config:/mosquitto/config
      - ./docker/mosquitto/data:/mosquitto/data
      - ./docker/mosquitto/log:/mosquitto/log

  # Data Collector - Now uses secure Reloader instead of docker.sock
  telegraf:
    image: telegraf:1.28
    container_name: drillbit_telegraf
    volumes:
      - telegraf_config:/etc/telegraf
      - ./docker/telegraf/reloader.sh:/usr/local/bin/reloader.sh
    entrypoint: ["/bin/sh", "/usr/local/bin/reloader.sh"]
    environment:
      - INFLUX_TOKEN=${INFLUXDB_TOKEN:-my-super-secret-auth-token}
    depends_on:
      - influxdb

  # Backend - Hardened (Removed docker.sock mount)
  backend:
    build: ./backend
    container_name: drillbit_backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - telegraf_config:/telegraf-config
      - ./docker/telegraf:/host-telegraf-config
    env_file:
      - .env
    environment:
      - INFLUX_URL=http://influxdb:8086
      - INFLUX_TOKEN=${INFLUXDB_TOKEN:-my-super-secret-auth-token}
      - LIVE_MODE=${LIVE_MODE:-true}
      - TELEGRAF_CONF_PATH=/telegraf-config/telegraf.conf
      - JWT_SECRET=${JWT_SECRET}
      - CORS_ORIGINS=${CORS_ORIGINS}
      - MANAGER_PIN=${MANAGER_PIN}
    depends_on:
      - influxdb
      - mosquitto
    extra_hosts:
      - "host.docker.internal:host-gateway"
      - "APPSVR:host-gateway"

  # Frontend - Publicly accessible on port 8081
  frontend:
    build: ./frontend
    container_name: drillbit_frontend
    ports:
      - "8081:80"
    volumes:
      - ./frontend/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend

volumes:
  influxdb_data:
  postgres_data:
  telegraf_config:
