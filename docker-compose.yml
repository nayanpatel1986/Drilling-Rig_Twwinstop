version: '3.8'

services:
  # Time-Series Database for Sensor Data & High-Frequency WITSML Logs
  influxdb:
    image: influxdb:2.7
    container_name: drillbit_influx
    ports:
      - "8087:8086"
    environment:
      - DOCKER_INFLUXDB_INIT_MODE=setup
      - DOCKER_INFLUXDB_INIT_USERNAME=admin
      - DOCKER_INFLUXDB_INIT_PASSWORD=password123
      - DOCKER_INFLUXDB_INIT_ORG=nov_rig
      - DOCKER_INFLUXDB_INIT_BUCKET=rig_data
      - DOCKER_INFLUXDB_INIT_ADMIN_TOKEN=my-super-secret-auth-token
    volumes:
      - influxdb_data:/var/lib/influxdb2

  # Relational Database for Metadata, Users, Reports
  postgres:
    image: postgres:15
    container_name: drillbit_postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=password123
      - POSTGRES_DB=rig_manager
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # MQTT Broker for Real-Time Pub/Sub
  mosquitto:
    image: eclipse-mosquitto:2
    container_name: drillbit_mqtt
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./docker/mosquitto/config:/mosquitto/config
      - ./docker/mosquitto/data:/mosquitto/data
      - ./docker/mosquitto/log:/mosquitto/log

  # Data Collector (Modbus → InfluxDB via Telegraf)
  telegraf:
    image: telegraf:1.28
    container_name: drillbit_telegraf
    volumes:
      - telegraf_config:/etc/telegraf
    environment:
      - INFLUX_TOKEN=my-super-secret-auth-token
    depends_on:
      - influxdb

  backend:
    build: ./backend
    container_name: drillbit_backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - telegraf_config:/telegraf-config
      - ./docker/telegraf:/host-telegraf-config
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - INFLUX_URL=http://influxdb:8086
      - INFLUX_TOKEN=my-super-secret-auth-token
      - LIVE_MODE=true
      - TELEGRAF_CONF_PATH=/telegraf-config/telegraf.conf
    depends_on:
      - influxdb
      - mosquitto
    extra_hosts:
      - "host.docker.internal:host-gateway"
      - "APPSVR:host-gateway"

  frontend:
    image: nginx:alpine
    container_name: drillbit_frontend
    ports:
      - "8081:80"
    volumes:
      - ./frontend/dist:/usr/share/nginx/html:ro
      - ./frontend/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend

volumes:
  influxdb_data:
  postgres_data:
  telegraf_config:
