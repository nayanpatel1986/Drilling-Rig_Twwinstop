[agent]
  interval = "500ms"
  round_interval = true
  metric_batch_size = 1000
  metric_buffer_limit = 10000
  collection_jitter = "0s"
  flush_interval = "500ms"
  flush_jitter = "0s"
  precision = ""
  hostname = "modbus"
  omit_hostname = false

[[inputs.internal]]
  collect_memstats = true

[[outputs.influxdb_v2]]
  urls = ["http://influxdb:8086"]
  token = "my-super-secret-auth-token"
  organization = "nov_rig"
  bucket = "rig_data"

# ── TWINSTOP (twinstop) ──
[[inputs.modbus]]
  name = "rig_sensors"
  slave_id = 1
  timeout = "1s"
  name_override = "modbus"
  configuration_type = "register"
  controller = "tcp://192.168.1.10:502"

  holding_registers = [
    { name = "Point1Capture", byte_order = "CDAB", data_type = "FLOAT32-IEEE", scale = 1.0, address = [440, 441] },
    { name = "Point2Capture", byte_order = "CDAB", data_type = "FLOAT32-IEEE", scale = 1.0, address = [456, 457] },
    { name = "Point3Capture", byte_order = "CDAB", data_type = "FLOAT32-IEEE", scale = 1.0, address = [472, 473] },
    { name = "LiveEncounterCount", byte_order = "CDAB", data_type = "FLOAT32-IEEE", scale = 1.0, address = [408, 409] },
    { name = "BH", byte_order = "CDAB", data_type = "FLOAT32-IEEE", scale = 1.0, address = [416, 417] },
    { name = "Crownomatic", byte_order = "CDAB", data_type = "FLOAT32-IEEE", scale = 1.0, address = [496, 497] },
    { name = "Flooromatic", byte_order = "CDAB", data_type = "FLOAT32-IEEE", scale = 1.0, address = [504, 505] },
    { name = "AlarmOffset", byte_order = "CDAB", data_type = "FLOAT32-IEEE", scale = 1.0, address = [512, 513] },
    { name = "H1", byte_order = "CDAB", data_type = "FLOAT32-IEEE", scale = 1.0, address = [448, 449] },
    { name = "H2", byte_order = "CDAB", data_type = "FLOAT32-IEEE", scale = 1.0, address = [464, 465] },
    { name = "H3", byte_order = "CDAB", data_type = "FLOAT32-IEEE", scale = 1.0, address = [480, 481] },
  ]

  [inputs.modbus.tags]
    device_name = "TWINSTOP"
    device_type = "twinstop"
    rig_id = "E-1400-1"

# ── ENGINE 1 (engine) ──
[[inputs.modbus]]
  name = "rig_sensors"
  slave_id = 1
  timeout = "1s"
  name_override = "modbus"
  configuration_type = "register"
  controller = "tcp://192.168.1.11:502"

  holding_registers = [
    { name = "RPM", byte_order = "ABCD", data_type = "FLOAT32-IEEE", scale = 1.0, address = [0, 1] },
    { name = "OilPressure", byte_order = "ABCD", data_type = "FLOAT32-IEEE", scale = 1.0, address = [2, 3] },
    { name = "OilTemperature", byte_order = "ABCD", data_type = "FLOAT32-IEEE", scale = 1.0, address = [4, 5] },
    { name = "CoolantTemp", byte_order = "ABCD", data_type = "FLOAT32-IEEE", scale = 1.0, address = [6, 7] },
    { name = "ExhaustTemp", byte_order = "ABCD", data_type = "FLOAT32-IEEE", scale = 1.0, address = [8, 9] },
    { name = "FuelRate", byte_order = "ABCD", data_type = "FLOAT32-IEEE", scale = 1.0, address = [10, 11] },
    { name = "RunHours", byte_order = "ABCD", data_type = "FLOAT32-IEEE", scale = 1.0, address = [12, 13] },
    { name = "LoadPercent", byte_order = "ABCD", data_type = "FLOAT32-IEEE", scale = 1.0, address = [14, 15] },
    { name = "InstFuelCons", byte_order = "AB", data_type = "UINT16", scale = 0.05, address = [255] },
    { name = "TotalFuelCons", byte_order = "ABCD", data_type = "UINT32", scale = 1.0, address = [891, 892] },
    { name = "OverallPowerFactor", byte_order = "AB", data_type = "UINT16", scale = 1.0, address = [102] },
    { name = "TotalReactivePower", byte_order = "ABCD", data_type = "UINT32", scale = 1.0, address = [140, 141] },
    { name = "TotalPercentKW", byte_order = "AB", data_type = "UINT16", scale = 1.0, address = [104] },
  ]

  [inputs.modbus.tags]
    device_name = "ENGINE 1"
    device_type = "engine"
    rig_id = "E-1400-1"

